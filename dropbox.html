<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropbox Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Dropbox Clone</h1>
        <p>Upload, browse, download files and shared todo boards instantly.</p>
      </div>
      <button id="openUploadModal" class="primary-btn">Add File / Gallery Item</button>
    </header>

    <main>
      <section class="section-card">
        <div class="section-header">
          <div>
            <h2>Shared Files Gallery</h2>
            <p>Browse all uploaded pdf, doc, and jpg files.</p>
          </div>
          <div class="filters-row">
            <input id="searchInput" placeholder="Search title, description, tag" />
            <select id="filterTag">
              <option value="">All tags</option>
            </select>
            <select id="filterDate">
              <option value="">All dates</option>
              <option value="latest">Latest first</option>
              <option value="oldest">Oldest first</option>
            </select>
          </div>
        </div>

        <div id="fileGallery" class="gallery-grid"></div>
      </section>

      <section class="section-card">
        <div class="section-header">
          <div>
            <h2>Shared Todo Boards</h2>
            <p>Live-updating todo canvas. Check items and everyone sees it instantly.</p>
          </div>
          <button id="openTodoModal" class="secondary-btn">Add Todo Board</button>
        </div>

        <div id="todoGallery" class="gallery-grid"></div>
      </section>
    </main>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-card">
      <button id="closeModal" class="close-btn">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <div id="previewOverlay" class="modal-overlay hidden">
    <div class="modal-card preview-card">
      <button id="closePreview" class="close-btn">×</button>
      <div id="previewContent"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
